name: Desktop Release CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/desktop-release.yml'
      - 'docs/desktop-release.md'
      - 'package.json'
      - 'package-lock.json'
      - 'sample-vault/**'
      - 'scripts/**'
      - 'src/**'
      - 'src-tauri/**'
      - 'static/**'
      - 'svelte.config.js'
      - 'vite.config.ts'
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '.github/workflows/desktop-release.yml'
      - 'docs/desktop-release.md'
      - 'package.json'
      - 'package-lock.json'
      - 'sample-vault/**'
      - 'scripts/**'
      - 'src/**'
      - 'src-tauri/**'
      - 'static/**'
      - 'svelte.config.js'
      - 'vite.config.ts'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: desktop-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-release:
    name: Desktop release (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            os: macos-latest
            artifact: diamond-markdown-desktop-macos
            bundles: app
          - label: Windows
            os: windows-latest
            artifact: diamond-markdown-desktop-windows
            bundles: nsis
          - label: Linux
            os: ubuntu-latest
            artifact: diamond-markdown-desktop-linux
            bundles: deb,appimage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Verify web release gate
        run: npm run verify:release

      - name: Verify desktop preflight
        run: npm run verify:desktop-release

      - name: Build self-contained desktop artifacts
        run: npm run desktop:build:self-contained
        env:
          DIAMOND_DESKTOP_BUNDLES: ${{ matrix.bundles }}

      - name: Write desktop artifact manifest
        run: npm run desktop:write-artifact-manifest
        env:
          DIAMOND_DESKTOP_BUNDLES: ${{ matrix.bundles }}

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.sha }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error

  publish-draft-release:
    name: Publish draft GitHub Release
    needs: desktop-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: desktop-artifacts

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find desktop-artifacts -mindepth 1 -maxdepth 1 -type d -print | sort | while read -r artifact_dir; do
            artifact_name="$(basename "$artifact_dir")"
            archive="$PWD/release-assets/${artifact_name}.zip"
            (cd "$artifact_dir" && zip -r "$archive" .)
          done
          test "$(find release-assets -type f -name '*.zip' | wc -l | tr -d ' ')" -gt 0
          find release-assets -maxdepth 1 -type f -print | sort

      - name: Write draft release notes
        shell: bash
        run: |
          cat > release-notes.md <<'NOTES'
          # Diamond Markdown desktop artifacts

          This draft release contains unsigned desktop artifacts built by the
          cross-platform release workflow. Each platform archive includes the
          Tauri bundle output plus `diamond-desktop-artifacts.manifest.json`
          with file sizes and SHA-256 hashes.

          These artifacts are for release rehearsal until signing,
          notarization, and installer policy are configured.
          NOTES

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          title="Diamond Markdown ${TAG_NAME}"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/*.zip --clobber
            gh release edit "$TAG_NAME" --draft --title "$title" --notes-file release-notes.md
          else
            gh release create "$TAG_NAME" release-assets/*.zip \
              --draft \
              --verify-tag \
              --title "$title" \
              --notes-file release-notes.md
          fi
