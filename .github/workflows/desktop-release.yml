name: Desktop Release CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/desktop-release.yml'
      - 'docs/desktop-release.md'
      - 'package.json'
      - 'package-lock.json'
      - 'sample-vault/**'
      - 'scripts/**'
      - 'src/**'
      - 'src-tauri/**'
      - 'static/**'
      - 'svelte.config.js'
      - 'vite.config.ts'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/desktop-release.yml'
      - 'docs/desktop-release.md'
      - 'package.json'
      - 'package-lock.json'
      - 'sample-vault/**'
      - 'scripts/**'
      - 'src/**'
      - 'src-tauri/**'
      - 'static/**'
      - 'svelte.config.js'
      - 'vite.config.ts'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: desktop-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-release:
    name: Desktop release (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS
            os: macos-latest
            artifact: diamond-markdown-desktop-macos
            bundles: app
          - label: Windows
            os: windows-latest
            artifact: diamond-markdown-desktop-windows
            bundles: nsis
          - label: Linux
            os: ubuntu-latest
            artifact: diamond-markdown-desktop-linux
            bundles: deb,appimage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Verify web release gate
        run: npm run verify:release

      - name: Verify desktop preflight
        run: npm run verify:desktop-release

      - name: Build self-contained desktop artifacts
        run: npm run desktop:build:self-contained
        env:
          DIAMOND_DESKTOP_BUNDLES: ${{ matrix.bundles }}

      - name: Write desktop artifact manifest
        run: npm run desktop:write-artifact-manifest
        env:
          DIAMOND_DESKTOP_BUNDLES: ${{ matrix.bundles }}

      - name: Upload desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.sha }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error
